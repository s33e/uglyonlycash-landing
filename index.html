<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlycash.money</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }
        .container {
            border: 2px solid #0f0;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 0 20px #0f0;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
        }
        .status {
            margin-top: 1rem;
            font-size: 1.2rem;
            background: #0f0;
            color: #000;
            padding: 5px 10px;
            display: inline-block;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .cursor {
            animation: blink 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ONLYCASH</h1>
        <div class="status">SYSTEM_INITIALIZING...<span class="cursor">_</span></div>
    </div>
    <div class="footer">
        MONEY IS THE ONLY OBJECTIVE.
    </div>
</body>
</html>
